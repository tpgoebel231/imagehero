<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotaxi Incident Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="max-w-7xl mx-auto px-4 py-8">
        
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-slate-900">ADS Incident Tracker</h1>
            <p class="text-slate-500">Comparing Unsupervised Robotaxi Deployments (Waymo vs. Tesla)</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                <div class="text-sm font-medium text-slate-500 uppercase">Total Reports</div>
                <div class="text-4xl font-bold mt-2" id="stat-total">-</div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <div class="text-sm font-medium text-slate-500 uppercase">Waymo Incidents</div>
                <div class="text-4xl font-bold mt-2 text-blue-600" id="stat-waymo">-</div>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500">
                <div class="text-sm font-medium text-slate-500 uppercase">Tesla Incidents</div>
                <div class="text-4xl font-bold mt-2 text-red-600" id="stat-tesla">-</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4">Incidents by City</h3>
                <canvas id="chartCity"></canvas>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-4">What did they hit?</h3>
                <canvas id="chartCrash"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 sticky top-4">
                    <h3 class="font-bold mb-2">Geographic Distribution</h3>
                    <div id="map" class="h-96 w-full rounded bg-slate-100"></div>
                    <p class="text-xs text-slate-400 mt-2">* Locations aggregated by City (Privacy Redacted).</p>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-sm border border-slate-200 flex flex-col h-[800px]">
                    <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                        <h3 class="font-bold text-lg">Incident Feed</h3>
                        <input type="text" id="searchInput" placeholder="Search incidents..." 
                               class="border border-slate-300 rounded px-3 py-1 text-sm focus:outline-none focus:border-blue-500 w-1/2">
                    </div>
                    <div id="feed" class="flex-1 overflow-y-auto p-4 space-y-4">
                        <div class="text-center text-gray-400 mt-10">Loading data...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
